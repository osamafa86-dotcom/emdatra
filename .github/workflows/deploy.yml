name: Deploy to GoDaddy (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check FTP secrets
        id: check
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP secrets not set yet — skipping deploy. Add FTP_SERVER, FTP_USERNAME and FTP_PASSWORD under Settings → Secrets and variables → Actions, then re-run this workflow."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via FTP
        if: steps.check.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: public_html/emdatra/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README.md
            **/*.zip
